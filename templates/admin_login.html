{% extends "layout.html" %}
{% block title %}Admin Login - TravelBangladesh{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Admin Login</h1>
    <p>Secure admin access</p>
</div>

<div style="max-width: 400px; margin: 60px auto; padding: 30px; background: var(--dark-bg, #1a1a1a); border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
    <h2 style="text-align: center; color: var(--gold-crayola); margin-bottom: 30px;">Admin Panel Login</h2>

    <form method="POST" action="/admin/login">
        <div style="margin-bottom: 20px;">
            <label style="display: block; color: white; margin-bottom: 8px; font-weight: bold;">Email</label>
            <input 
                type="email" 
                name="email" 
                placeholder="admin@travelbd.com" 
                required
                style="width: 100%; padding: 12px; border: 1px solid var(--gold-crayola); border-radius: 4px; background: #333; color: white; font-size: 14px; box-sizing: border-box;"
            >
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; color: white; margin-bottom: 8px; font-weight: bold;">Password</label>
            <input 
                type="password" 
                name="password" 
                placeholder="Enter admin password" 
                required
                style="width: 100%; padding: 12px; border: 1px solid var(--gold-crayola); border-radius: 4px; background: #333; color: white; font-size: 14px; box-sizing: border-box;"
            >
        </div>

        <div style="margin-top: 25px;">
            <button 
                type="submit" 
                style="width: 100%; padding: 12px; background: var(--gold-crayola); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; transition: background 0.3s;"
                onmouseover="this.style.background='#d4a300'"
                onmouseout="this.style.background='var(--gold-crayola)'"
            >
                Login as Admin
            </button>
        </div>
    </form>

    <p style="text-align: center; color: #999; margin-top: 20px; font-size: 12px;">
        Authorized personnel only
    </p>
</div>

{% endblock %}
